# NetAI Configuration File
# Place this in your repo root to enable commit-triggered training

model:
  name: "gpt2-small"
  architecture: "transformer"
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  vocab_size: 50257
  intermediate_size: 3072

training:
  total_steps: 10000
  batch_size: 8
  micro_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  optimizer: "adamw"
  weight_decay: 0.01
  warmup_steps: 100
  max_seq_length: 2048
  precision: "fp32"
  seed: 42
  device_preference: "cuda"

checkpoint:
  interval: 500
  eval_interval: 200
  log_interval: 10
  keep_last: 3

dataset:
  name: ""
  config: {}

scheduler:
  num_shards: 1
  policy: "resource_aware"

group:
  id: ""
  visibility: "private"
  voting_threshold: 0.6
  voting_quorum: 0.3
  voting_period_hours: 72

github:
  repo_url: ""
  branch: "main"
  trigger_paths:
    - "model/"
    - "config/"
    - "netai.yaml"
    - "training/"
  auto_train_on_push: true
  auto_push_model: true